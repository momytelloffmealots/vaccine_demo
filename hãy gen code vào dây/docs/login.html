<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập - Hệ thống tiêm chủng</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:520px;margin:90px auto;">
      <div class="brand" style="margin-bottom:10px;">
        <span style="color:var(--accent);font-size:18px;">Vaccination</span>
        <span class="badge">Demo GitHub Pages</span>
      </div>
      <h2 style="margin:0 0 8px;">Đăng nhập</h2>
      <div class="hint" style="margin-bottom:14px;">Dùng để truy cập các trang theo vai trò.</div>

      <div id="msg" class="msg" style="display:none;"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" placeholder="ví dụ: QT001 / BS001" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Mật khẩu" required />
        </div>
        <div style="margin-top:16px;display:flex;gap:10px;align-items:center;">
          <button class="btn primary" type="submit">Đăng nhập</button>
          <span class="hint">API: đổi trong `assets/js/api.js` nếu cần.</span>
        </div>
      </form>
    </div>
  </div>

  <script src="./assets/js/api.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    function showMsg(text, isError=false){
      msg.style.display = "block";
      msg.textContent = text;
      msg.className = "msg" + (isError ? " error" : "");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try{
        const payload = await apiRequest("/api/auth/login", {
          method: "POST",
          body: { username, password }
        });
        if(!payload?.success){
          showMsg(payload?.message || "Đăng nhập thất bại", true);
          return;
        }

        localStorage.setItem("session", JSON.stringify(payload));
        window.location.href = "./dashboard.html";
      }catch(err){
        showMsg(err.message || "Lỗi đăng nhập", true);
      }
    });
  </script>
</body>
</html>
