<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý vaccine</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <span style="color:var(--accent);font-size:18px;">Vaccination</span>
        <span class="badge">Quản lý vaccine</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button class="btn" type="button" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="nav">
          <a id="nav-vaccine" href="./vaccines.html">Quản lý vaccine</a>
          <a id="nav-forms" href="./vaccination-forms.html">Tạo phiếu tiêm</a>
          <a id="nav-payment" href="./payment.html">Thanh toán</a>
          <a id="nav-statistics" href="./statistics.html">Thống kê</a>
          <a id="nav-history" href="./history.html">Lịch sử tiêm</a>
          <a id="nav-account" href="./account.html">Quản lý tài khoản</a>
        </div>
        <div style="margin-top:14px;" class="hint">Trang này dùng chung cho nhiều role.</div>
      </aside>

      <main class="content">
        <div class="card">
          <h2 style="margin:0 0 10px;">Danh sách vaccine</h2>

          <div class="row">
            <div class="field" style="flex:1;min-width:260px;">
              <label for="keyword">Tìm kiếm</label>
              <input id="keyword" placeholder="MAVACCINE / TENVACCINE / NHASX / LOAIVACCINE ..." />
            </div>
            <div class="field">
              <label for="days">Sắp hết hạn (ngày)</label>
              <input id="days" type="number" min="1" value="30" />
            </div>
            <div style="align-self:flex-end;display:flex;gap:10px;flex-wrap:wrap;">
              <button class="btn primary" onclick="loadAll()">Tải tất cả</button>
              <button class="btn primary" onclick="searchAll()">Tìm kiếm vaccine</button>
              <button class="btn primary" onclick="loadExpiring()">Sắp hết hạn</button>
            </div>
          </div>

          <div id="msg" class="msg" style="display:none;margin-top:12px;"></div>

          <div style="margin-top:14px;">
            <table>
              <thead>
              <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Nhà sản xuất</th>
                <th>Ngày SX</th>
                <th>Hạn SD</th>
                <th>Lô</th>
                <th>SL</th>
                <th>Đơn giá</th>
                <th>Loại</th>
                <th>Ngày còn lại</th>
              </tr>
              </thead>
              <tbody id="tBody"></tbody>
            </table>
            <div class="hint" style="margin-top:10px;">Cột “Ngày còn lại” chỉ hiện khi tải dữ liệu sắp hết hạn.</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/app.js"></script>
  <script>
    initPage();
    let currentMode = "all";

    function showMsg(text, isError=false){
      const msg = document.getElementById("msg");
      msg.style.display = "block";
      msg.textContent = text;
      msg.className = "msg" + (isError ? " error" : "");
    }

    function renderRows(items, { showDaysLeft }){
      const tb = document.getElementById("tBody");
      tb.innerHTML = "";
      for (const it of items){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${it.vaccineId ?? ""}</td>
          <td>${it.name ?? ""}</td>
          <td>${it.manufacturer ?? ""}</td>
          <td>${it.productionDate ?? ""}</td>
          <td>${it.expiryDate ?? ""}</td>
          <td>${it.lot ?? ""}</td>
          <td>${it.quantityAvailable ?? ""}</td>
          <td>${it.price ?? ""}</td>
          <td>${it.vaccineTypeName ?? ""}</td>
          <td>${showDaysLeft ? (it.daysLeft ?? "") : ""}</td>
        `;
        tb.appendChild(tr);
      }
    }

    async function loadAll(){
      currentMode = "all";
      try{
        const payload = await apiRequest("/api/vaccines");
        renderRows(payload, { showDaysLeft:false });
        showMsg("Tải tất cả thành công.");
      }catch(err){
        showMsg(err.message, true);
      }
    }

    async function searchAll(){
      currentMode = "search";
      const keyword = document.getElementById("keyword").value || "";
      try{
        const payload = await apiRequest(`/api/vaccines/search?keyword=${encodeURIComponent(keyword)}`);
        renderRows(payload, { showDaysLeft:false });
        showMsg("Tìm kiếm thành công.");
      }catch(err){
        showMsg(err.message, true);
      }
    }

    async function loadExpiring(){
      currentMode = "expiring";
      const days = parseInt(document.getElementById("days").value || "30", 10);
      const keyword = document.getElementById("keyword").value || "";
      try{
        const payload = keyword.trim()
          ? await apiRequest(`/api/vaccines/search/expiring?keyword=${encodeURIComponent(keyword)}&days=${days}`)
          : await apiRequest(`/api/vaccines/expiring?days=${days}`);
        renderRows(payload, { showDaysLeft:true });
        showMsg("Tải dữ liệu sắp hết hạn thành công.");
      }catch(err){
        showMsg(err.message, true);
      }
    }

    loadAll();
  </script>
</body>
</html>
